<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Mahjong Mirror — Org Chart</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #ffffff;
    font-family: Arial, Helvetica, sans-serif;
    color: #333333;
    padding: 52px 40px 72px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── Header ── */
  .report-header {
    width: 100%;
    max-width: 860px;
    margin-bottom: 36px;
    padding-bottom: 10px;
    border-bottom: 2px solid #6FF2C1;
  }
  .report-header .brand {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #04102D;
  }
  .report-header .brand span {
    color: #888888;
    font-weight: 400;
  }

  /* ── Title block ── */
  .title-block {
    width: 100%;
    max-width: 860px;
    margin-bottom: 40px;
  }
  .title-block h1 {
    font-size: 18pt;
    font-weight: 700;
    color: #04102D;
    line-height: 1.2;
    margin-bottom: 4px;
  }
  .title-block .subtitle {
    font-size: 11pt;
    font-style: italic;
    color: #555555;
    margin-bottom: 14px;
  }
  .mint-rule {
    height: 0;
    border: none;
    border-bottom: 4px solid #6FF2C1;
    margin-bottom: 0;
  }

  /* ── Legend ── */
  .legend {
    display: flex;
    gap: 28px;
    margin-bottom: 40px;
    align-self: flex-start;
    max-width: 860px;
    width: 100%;
  }
  .leg {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 9pt;
    color: #555555;
  }
  .pip {
    width: 10px; height: 10px;
    border-radius: 2px;
  }
  .pip.human { background: #04102D; }
  .pip.agent { background: #EAEEF2; border: 1px solid #287BE8; }

  /* ── SVG lines ── */
  line { stroke: #6FF2C1; stroke-width: 1.5; }

  /* ── Node cards ── */
  .card {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 12px 16px;
    border-radius: 4px;
    width: 100%;
    height: 100%;
    gap: 3px;
  }

  /* Human: Navy bg, white text (like table header rows) */
  .card.human {
    background: #04102D;
    border: none;
    box-shadow: 0 2px 8px rgba(4,16,45,0.18);
  }
  .card.human .badge {
    background: rgba(111,242,193,0.15);
    color: #6FF2C1;
    border: 1px solid rgba(111,242,193,0.3);
  }
  .card.human .name  { color: #ffffff; }
  .card.human .role  { color: #888888; }

  /* Agent: Light gray bg, Navy text */
  .card.agent {
    background: #EAEEF2;
    border: 1px solid #d0d6de;
    box-shadow: 0 1px 4px rgba(4,16,45,0.08);
  }
  .card.agent .badge {
    background: rgba(40,123,232,0.1);
    color: #287BE8;
    border: 1px solid rgba(40,123,232,0.25);
  }
  .card.agent .name  { color: #04102D; }
  .card.agent .role  { color: #888888; }
  .card.agent .owns  { color: #888888; }

  .badge {
    font-size: 8pt;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 20px;
    margin-bottom: 2px;
  }
  .name {
    font-size: 11pt;
    font-weight: 700;
    line-height: 1.2;
  }
  .role {
    font-size: 9pt;
    font-weight: 400;
  }
  .owns {
    font-size: 8pt;
    margin-top: 1px;
  }
</style>
</head>
<body>

<!-- Header -->
<div class="report-header">
  <div class="brand">MAHJONG MIRROR <span>| Organizational Structure</span></div>
</div>

<!-- Title -->
<div class="title-block">
  <h1>Company Org Chart</h1>
  <p class="subtitle">Human &amp; AI Agent Reporting Structure</p>
  <hr class="mint-rule" />
</div>

<!-- Legend -->
<div class="legend">
  <div class="leg"><div class="pip human"></div> Human</div>
  <div class="leg"><div class="pip agent"></div> AI Agent</div>
</div>

<!-- SVG Chart -->
<svg width="820" height="420" viewBox="0 0 820 420" style="overflow:visible; display:block;">
  <defs>
    <style>line { stroke: #6FF2C1; stroke-width: 1.5; }</style>
  </defs>

  <!-- Connectors -->
  <!-- Dave → split bar -->
  <line x1="410" y1="82"  x2="410" y2="130" />
  <line x1="175" y1="130" x2="615" y2="130" />

  <!-- Left side: Dave's agents -->
  <line x1="175" y1="130" x2="175" y2="158" />
  <line x1="100" y1="158" x2="250" y2="158" />
  <line x1="100" y1="158" x2="100" y2="186" />
  <line x1="250" y1="158" x2="250" y2="186" />

  <!-- Right side: Yon -->
  <line x1="615" y1="130" x2="615" y2="186" />

  <!-- Yon → agents bar -->
  <line x1="615" y1="258" x2="615" y2="286" />
  <line x1="470" y1="286" x2="760" y2="286" />
  <line x1="470" y1="286" x2="470" y2="314" />
  <line x1="615" y1="286" x2="615" y2="314" />
  <line x1="760" y1="286" x2="760" y2="314" />

  <!-- ── Nodes ── -->

  <!-- Dave (CEO) -->
  <foreignObject x="300" y="0" width="220" height="82">
    <div xmlns="http://www.w3.org/1999/xhtml" class="card human">
      <span class="badge">Human · CEO</span>
      <span class="name">Dave</span>
    </div>
  </foreignObject>

  <!-- Project Manager -->
  <foreignObject x="18" y="186" width="164" height="80">
    <div xmlns="http://www.w3.org/1999/xhtml" class="card agent">
      <span class="badge">AI Agent</span>
      <span class="name">Project Manager</span>
      <span class="owns">owned by Dave</span>
    </div>
  </foreignObject>

  <!-- Product Manager -->
  <foreignObject x="168" y="186" width="164" height="80">
    <div xmlns="http://www.w3.org/1999/xhtml" class="card agent">
      <span class="badge">AI Agent</span>
      <span class="name">Product Manager</span>
      <span class="owns">owned by Dave</span>
    </div>
  </foreignObject>

  <!-- Yon (COO) -->
  <foreignObject x="505" y="186" width="220" height="72">
    <div xmlns="http://www.w3.org/1999/xhtml" class="card human">
      <span class="badge">Human · COO</span>
      <span class="name">Yon</span>
    </div>
  </foreignObject>

  <!-- Website Developer -->
  <foreignObject x="388" y="314" width="164" height="80">
    <div xmlns="http://www.w3.org/1999/xhtml" class="card agent">
      <span class="badge">AI Agent</span>
      <span class="name">Website Developer</span>
      <span class="owns">owned by Yon</span>
    </div>
  </foreignObject>

  <!-- Writer -->
  <foreignObject x="533" y="314" width="164" height="80">
    <div xmlns="http://www.w3.org/1999/xhtml" class="card agent">
      <span class="badge">AI Agent</span>
      <span class="name">Writer</span>
      <span class="owns">owned by Yon</span>
    </div>
  </foreignObject>

  <!-- Designer -->
  <foreignObject x="678" y="314" width="164" height="80">
    <div xmlns="http://www.w3.org/1999/xhtml" class="card agent">
      <span class="badge">AI Agent</span>
      <span class="name">Designer</span>
      <span class="owns">owned by Yon</span>
    </div>
  </foreignObject>

</svg>

<!-- Footer -->
<div style="margin-top: 48px; width: 100%; max-width: 860px; padding-top: 8px; border-top: 1px solid #EAEEF2; display: flex; justify-content: space-between; align-items: center;">
  <span style="font-size: 9pt; color: #888888;">Internal Use</span>
  <span style="font-size: 9pt; color: #888888;">Mahjong Mirror</span>
</div>

</body>
</html>
